version: "3.9"

services:
  db:
    image: postgres:15
    container_name: tesco_db_e2e
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tesco_e2e
    volumes:
      - ./selenium/src/test/resources/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    networks:
      - e2enet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile_inline: |
        FROM maven:3-eclipse-temurin-17 AS build
        WORKDIR /app
        COPY pom.xml .
        COPY src/ ./src
        RUN mvn clean package -DskipTests
        
        FROM eclipse-temurin:17-jre-alpine AS runtime
        WORKDIR /app
        COPY --from=build /app/target/*.jar app.jar
        EXPOSE 8080
        CMD ["java", "-jar", "app.jar"]
    container_name: backend_e2e
    environment:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tesco_e2e
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    networks:
      - e2enet
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile_inline: |
        FROM node:20 AS build
        WORKDIR /app
        COPY package*.json ./
        RUN npm install
        COPY . .
        RUN npm run build
        
        FROM nginx:alpine AS runtime
        COPY nginx.e2e.conf /etc/nginx/conf.d/default.conf
        WORKDIR /usr/share/nginx/html
        COPY --from=build /app/dist .
        EXPOSE 80
        CMD ["nginx", "-g", "daemon off;"]
    container_name: frontend_e2e
    depends_on:
      - backend
    networks:
      - e2enet
    ports:
      - "3000:80"

networks:
  e2enet: {}