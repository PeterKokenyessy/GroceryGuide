log_format api_log '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                   'upstream:$upstream_addr $upstream_status $upstream_response_time';

server {
    listen 10000;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        resolver 8.8.8.8 valid=30s;
        set $backend "https://tesco-backend-latest.onrender.com";
        proxy_pass $backend;

        proxy_ssl_server_name on;
        proxy_ssl_name tesco-backend-latest.onrender.com;

        proxy_set_header Host tesco-backend-latest.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        access_log /var/log/nginx/api.log api_log;

    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}