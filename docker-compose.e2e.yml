version: "3.9"

services:
  db:
    image: postgres:15
    container_name: tesco-db-e2e
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tesco_e2e
    volumes:
      - ./selenium/src/test/resources/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    networks:
      - e2enet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile_inline: |
        FROM eclipse-temurin:17-jre-alpine AS runtime
        WORKDIR /app
        COPY app.jar app.jar
        EXPOSE 8080
        CMD ["java", "-jar", "app.jar"]
    container_name: backend-e2e
    environment:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tesco_e2e
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    networks:
      - e2enet
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile_inline: |
        FROM nginx:alpine AS runtime
        COPY nginx.e2e.conf /etc/nginx/conf.d/default.conf
        WORKDIR /usr/share/nginx/html
        COPY dist .
        EXPOSE 80
        CMD ["nginx", "-g", "daemon off;"]
    container_name: frontend-e2e
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - e2enet
    ports:
      - "3000:80"

  selenium:
    image: selenium/standalone-chrome:latest
    container_name: selenium-e2e
    ports:
      - "4444:4444"
    networks:
      - e2enet
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4444/wd/hub/status || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  e2enet: {}