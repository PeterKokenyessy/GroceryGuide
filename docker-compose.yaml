version: "3.9"

services:
  backend:
    build:
      context: ./backend
      target: dev   # Use the dev stage
    container_name: backend
    restart: always
    volumes:
      - ./backend:/app   # host source mounted for hot reload
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - tesconet

  db:
    image: postgres:15
    container_name: tesco_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - tesconet

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: frontend
    restart: always
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      REACT_APP_BACKEND_URL: http://backend:8080
    ports:
      - "3000:5173"
    depends_on:
      - backend
    networks:
      - tesconet

volumes:
  db_data:

networks:
  tesconet: {}
