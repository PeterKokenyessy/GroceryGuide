name: CI Build & Test (development branch)

on:
  push:
    branches: [ "development" ]
  pull_request:
    branches: [ "development" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
# ---------------------------------------------------------------------------------------------------------------------------------------
# Runs before merge

  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test with Maven
      run: mvn -B package verify
      working-directory: ./backend

    - name: Upload backend jar
      uses: actions/upload-artifact@v4
      with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 1

    - name: Upload unit test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: unit-test-results
        path: backend/target/surefire-reports/
        retention-days: 7

    - name: Publish unit test results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: backend/target/surefire-reports/*.xml

    - name: Install frontend dependencies
      run: npm install
      working-directory: ./frontend
      
    - name: Build frontend
      run: npm run build
      working-directory: ./frontend

    - name: Upload frontend dist
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist/
        retention-days: 1

# ---------------------------------------------------------------------------------------------------------------------------------------
# Runs after merge — e2e and publish run in parallel, both depend on verify

  e2e:
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download backend jar
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend

      - name: Rename jar to app.jar
        run: mv backend/*.jar backend/app.jar

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Start e2e stack
        run: docker compose -f docker-compose.e2e.yml up --build -d

      - name: Wait for stack to be healthy
        run: |
          echo "Waiting for db..."
          timeout 60 bash -c 'until docker exec tesco-db-e2e pg_isready -U postgres; do sleep 2; done'

          echo "Waiting for backend..."
          timeout 90 bash -c 'until curl -sf http://localhost:8080/health; do sleep 3; done'

          echo "Waiting for selenium..."
          timeout 60 bash -c 'until curl -sf http://localhost:4444/wd/hub/status; do sleep 2; done'

          echo "All services healthy"
      - name: Run e2e tests
        run: mvn test
        working-directory: ./selenium

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: selenium/target/surefire-reports/
          retention-days: 7

      - name: Publish e2e test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: selenium/target/surefire-reports/*.xml

      - name: Tear down e2e stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down

  publish:
    if: github.event_name == 'push'
    needs: e2e
    
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download backend jar
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend

      - name: Rename jar to app.jar
        run: mv backend/*.jar backend/app.jar

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
    
      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: backend:ci
          target: runtime
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          load: true
          tags: frontend:ci
          target: runtime
          cache-from: type=gha
          cache-to: type=gha,mode=max
    
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Push backend image
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker tag backend:ci zoleman/tesco_backend:latest
          docker tag backend:ci zoleman/tesco_backend:$SHORT_SHA
          docker push zoleman/tesco_backend:latest
          docker push zoleman/tesco_backend:$SHORT_SHA
          
      - name: Push frontend image
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker tag frontend:ci zoleman/tesco_frontend:latest
          docker tag frontend:ci zoleman/tesco_frontend:$SHORT_SHA
          docker push zoleman/tesco_frontend:latest
          docker push zoleman/tesco_frontend:$SHORT_SHA

